name: Build Docker image and push to AWS ECR


on:
  workflow_call:
    inputs:
      aws-region:
        description: 'AWS Region'
        required: false
        type: string
        default: 'us-east-1'
      ecr-repository:
        description: 'ECR Repository'
        required: false
        type: string
        default: ${{ github.event.repository.name }}
      build-platforms:
        description: 'Build platforms'
        required: false
        type: string
        default: 'linux/amd64'
      image-tag:
        description: 'Image tag'
        required: false
        type: string
        default: 'run-number-${{ github.run_number }}'
      additional-tag:
        description: 'Newline-separated list of extra image tags (tag names only, without registry/repo prefix)'
        required: false
        type: string
        default: ''
      version:
        description: 'Application version'
        required: false
        type: string
        default: ${{ github.ref_name }}
      branch:
        description: 'Build branch'
        required: false
        type: string
        default: ${{ github.ref_name }}
      date:
        description: 'Build date'
        required: false
        type: string
        default: ''
      release-mode:
        description: 'Release mode for application build'
        required: false
        type: boolean
        default: false
      scan-image:
        description: 'Scan image for vulnerabilities'
        required: false
        type: boolean
        default: false
      runs-on:
        description: 'Type of runner to use'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      AWS_ROLE_ARN:
        description: 'IAM role ARN for OIDC authentication'
        required: false
      ECR_REPOSITORY:
        required: false
        description: 'Amazon ECR repository name'
      GH_USER:
        description: 'GitHub user'
        required: false
      GH_TOKEN:
        description: 'GitHub token'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ inputs.aws-region }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY || inputs.ecr-repository }}
  PLATFORMS: ${{ inputs.build-platforms }}
  IMAGE_TAG: ${{ inputs.image-tag }}
  VERSION: ${{ inputs.version }}
  BRANCH: ${{ inputs.branch }}
  DATE: ${{ inputs.date }}
  RELEASE_MODE: ${{ inputs.release-mode }}

jobs:
  build-and-export:
    name: Build and export to AWS ECR
    runs-on: ${{ inputs.runs-on }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Mask AWS account ID
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "::add-mask::${ACCOUNT_ID}"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image tags
        id: tags
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ADDITIONAL_TAGS: ${{ inputs.additional-tag }}
        run: |
          TAGS="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAGS="${TAGS}"$'\n'"${ECR_REGISTRY}/${ECR_REPOSITORY}:${tag}"
          done <<< "${ADDITIONAL_TAGS}"
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build
        uses: docker/build-push-action@v7
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ env.VERSION }}
            BUILD_BRANCH=${{ env.BRANCH }}
            BUILD_DATE=${{ env.DATE }}
            RELEASE_MODE=${{ env.RELEASE_MODE }}
            GITHUB_USER=${{ secrets.GH_USER }}
            GITHUB_TOKEN=${{ secrets.GH_TOKEN }}
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ steps.tags.outputs.tags }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        if: ${{ inputs.scan-image }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        with:
          image-ref: '${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Summarize
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          echo "## General information about the build:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Docker image in Amazon ECR: $ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_STEP_SUMMARY
          echo "- The commit SHA from which the build was performed: [$GITHUB_SHA](https://github.com/$GITHUB_REPOSITORY/commit/$GITHUB_SHA)" >> $GITHUB_STEP_SUMMARY
