name: Promote image from ECR to GCP Artifact Registry

on:
  workflow_call:
    inputs:
      service:
        description: 'Service name (e.g. service-api, service-jobs, migrations)'
        required: true
        type: string
      gcr-region:
        description: 'GCP Artifact Registry hostname (e.g. europe-docker.pkg.dev)'
        required: false
        type: string
        default: 'europe-docker.pkg.dev'
      image-tag:
        description: 'Destination image tag in GCP Artifact Registry (e.g. 5.15.5-r1)'
        required: true
        type: string
      aws-region:
        description: 'AWS region where the source ECR registry lives'
        required: false
        type: string
        default: 'us-east-1'
      gcp-project:
        description: 'GCP project ID that owns the Artifact Registry repository'
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:
        description: 'IAM role ARN (OIDC) used to authenticate to ECR'
        required: true
      GCR_SA_KEY:
        description: 'GCP service account JSON key for Artifact Registry push'
        required: true

jobs:
  promote:
    name: >-
      ${{ inputs.service }}:secure-latest →
      ${{ inputs.gcr-region }}/<project>/reportportal/${{ inputs.service }}:${{ inputs.image-tag }}
    runs-on: ubuntu-latest
    # Both ECR and GCR steps run inside the 'secure' environment so that
    # environment-scoped secrets and protection rules are enforced.
    environment: secure
    permissions:
      id-token: write   # Required for AWS OIDC
      contents: read

    steps:
      # ── AWS / ECR authentication ──────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Mask AWS account ID
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "::add-mask::${ACCOUNT_ID}"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'

      # ── GCP / Artifact Registry authentication ────────────────────────────
      - name: Login to GCP Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.gcr-region }}
          username: _json_key
          password: ${{ secrets.GCR_SA_KEY }}

      # ── Image promotion (retag only, no rebuild) ──────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Promote image (ECR → GCP Artifact Registry)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker buildx imagetools create \
            "${ECR_REGISTRY}/${{ inputs.service }}:secure-latest" \
            --tag "${{ inputs.gcr-region }}/${{ inputs.gcp-project }}/reportportal/${{ inputs.service }}:${{ inputs.image-tag }}"

      # ── Job summary ───────────────────────────────────────────────────────
      - name: Summarize
        if: always()
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "## Image Promotion Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | Image |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Source (ECR)** | \`${ECR_REGISTRY}/${{ inputs.service }}:secure-latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Target (GCR)** | \`${{ inputs.gcr-region }}/${{ inputs.gcp-project }}/reportportal/${{ inputs.service }}:${{ inputs.image-tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
