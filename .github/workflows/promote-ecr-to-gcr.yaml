name: Promote image from ECR to GCP Artifact Registry

on:
  workflow_call:
    inputs:
      service:
        description: 'Service name (e.g. service-api, service-jobs, migrations)'
        required: true
        type: string
      gcr-region:
        description: 'GCP Artifact Registry hostname (e.g. europe-docker.pkg.dev)'
        required: false
        type: string
        default: 'europe-docker.pkg.dev'
      image-tag:
        description: 'Destination image tag in GCP Artifact Registry (e.g. 5.15.5-r1)'
        required: true
        type: string
      aws-region:
        description: 'AWS region where the source ECR registry lives'
        required: false
        type: string
        default: 'us-east-1'
      gcp-project:
        description: 'GCP project ID that owns the Artifact Registry repository (optional if secret GCP_PROJECT is set)'
        required: false
        type: string
        default: ''
    secrets:
      AWS_ROLE_ARN:
        description: 'IAM role ARN (OIDC) used to authenticate to ECR'
        required: true
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        description: 'WIF provider resource name for keyless GCP auth'
        required: true
      GCP_SERVICE_ACCOUNT:
        description: 'GCP service account email to impersonate'
        required: true  
      GCR_REGION:
        description: 'GCP Artifact Registry hostname; takes precedence over the gcr-region input'
        required: false
      GCP_PROJECT:
        description: 'GCP project ID; takes precedence over the gcp-project input'
        required: false

jobs:
  promote:
    name: Promote ${{ inputs.service }} to GCP Artifact Registry
    runs-on: ubuntu-latest
    environment: secure
    permissions:
      id-token: write
      contents: read
    env:
      GCR_REGION: ${{ secrets.GCR_REGION || inputs.gcr-region }}
      GCP_PROJECT: ${{ secrets.GCP_PROJECT || inputs.gcp-project }}

    steps:
      - name: Validate configuration
        run: |
          if [ -z "${GCR_REGION}" ]; then
            echo "::error::GCR region is empty. Set secret GCR_REGION (e.g. 'europe-docker.pkg.dev') or pass 'gcr-region' input."
            exit 1
          fi
          if [ -z "${GCP_PROJECT}" ]; then
            echo "::error::GCP project is empty. Set secret GCP_PROJECT or pass 'gcp-project' input."
            exit 1
          fi
          if [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "::error::GCP_WORKLOAD_IDENTITY_PROVIDER secret is not set."
            exit 1
          fi
          if [ -z "${{ secrets.GCP_SERVICE_ACCOUNT }}" ]; then
            echo "::error::GCP_SERVICE_ACCOUNT secret is not set."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Mask AWS account ID
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "::add-mask::${ACCOUNT_ID}"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'

      - name: Authenticate to GCP
        id: gcp-auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
          create_credentials_file: false

      - name: Login to GCP Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GCR_REGION }}
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Promote image (ECR -> GCP Artifact Registry)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker buildx imagetools create \
            "${ECR_REGISTRY}/${{ inputs.service }}:secure-latest" \
            --tag "${GCR_REGION}/${GCP_PROJECT}/reportportal/${{ inputs.service }}:${{ inputs.image-tag }}"

      - name: Summarize
        run: |
          {
            echo "## GCP Artifact Registry Promotion Summary"
            echo ""
            echo "- Image: \`${GCR_REGION}/${GCP_PROJECT}/reportportal/${{ inputs.service }}:${{ inputs.image-tag }}\`"
            echo "- Source: ECR \`${{ inputs.service }}:secure-latest\`"
            echo "- Commit: [$GITHUB_SHA](https://github.com/$GITHUB_REPOSITORY/commit/$GITHUB_SHA)"
          } >> $GITHUB_STEP_SUMMARY
